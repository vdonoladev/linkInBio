<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13"/>
      <stop offset="100%" style="stop-color:#1a1230"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c47ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="80" y="260" width="160" height="6" rx="3" fill="url(#accent)"/>
  <!-- Logo circle -->
  <circle cx="116" cy="180" r="44" fill="#6c47ff" opacity="0.15"/>
  <circle cx="116" cy="180" r="44" fill="none" stroke="#6c47ff" stroke-width="2" opacity="0.4"/>
  <text x="116" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">Z</text>
  <!-- Title -->
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Jane Doe</text>
  <!-- Subtitle -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#a1a1aa">Designer, developer &amp; coffee enthusiast</text>
  <!-- Domain pill -->
  <rect x="80" y="440" width="220" height="44" rx="22" fill="#6c47ff" opacity="0.2"/>
  <rect x="80" y="440" width="220" height="44" rx="22" fill="none" stroke="#6c47ff" stroke-width="1.5" opacity="0.5"/>
  <text x="190" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle">janedoe.com</text>
  <!-- Powered by -->
  <text x="1120" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#52525b" text-anchor="end">Built with Zutrabio</text>
</svg>
